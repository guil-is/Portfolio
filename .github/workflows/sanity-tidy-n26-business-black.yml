name: Sanity — Tidy N26 Business Black

# Manually triggered cleanup run to apply after
# "Sanity — Merge projects" has committed the annie-o + ruby-barber
# merge into the n26-business-black slug. Rewrites summary, services,
# and projectDetails on that single document.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "When true, log the plan without mutating Sanity"
        required: true
        type: boolean
        default: true

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tidy
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npx tsx scripts/sanity/tidy-n26-business-black.ts

      - name: Upload pre-tidy backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-tidy-n26-business-black-${{ github.run_id }}
          path: scripts/sanity/backups/
          if-no-files-found: ignore
          retention-days: 90
