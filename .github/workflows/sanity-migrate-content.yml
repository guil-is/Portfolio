name: Sanity — Migrate project content

# Moves rich projectDetails (HTML), stillFrames (image URLs), and
# features (image+caption rows) from src/content/projects.ts into
# Sanity as Portable Text blocks + uploaded image assets.
#
# Two trigger modes:
#   1. Manual: Actions tab → Run workflow → fill inputs
#   2. Automated: push a JSON trigger file at
#      .github/triggers/migrate-content.json (Claude does this)
#
# See scripts/sanity/migrate-project-content.ts for the implementation.

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated project slugs to migrate, or 'all'"
        required: true
        type: string
        default: "all"
      fields:
        description: "Fields to migrate (comma-separated). Subset of: projectDetails,stillFrames,features"
        required: true
        type: string
        default: "projectDetails,stillFrames,features"
      force:
        description: "Overwrite existing Sanity content (normally skips populated fields)"
        required: true
        type: boolean
        default: false
      dry_run:
        description: "When true, log the plan without mutating Sanity"
        required: true
        type: boolean
        default: true
  push:
    branches: [main]
    paths: [".github/triggers/migrate-content.json"]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve inputs
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "SLUGS=$(jq -r '.slugs // "all"' .github/triggers/migrate-content.json)" >> "$GITHUB_OUTPUT"
            echo "FIELDS=$(jq -r '.fields // "projectDetails,stillFrames,features"' .github/triggers/migrate-content.json)" >> "$GITHUB_OUTPUT"
            echo "FORCE=$(jq -r '.force // false' .github/triggers/migrate-content.json)" >> "$GITHUB_OUTPUT"
            echo "DRY_RUN=$(jq -r '.dry_run // true' .github/triggers/migrate-content.json)" >> "$GITHUB_OUTPUT"
          else
            echo "SLUGS=${{ inputs.slugs }}" >> "$GITHUB_OUTPUT"
            echo "FIELDS=${{ inputs.fields }}" >> "$GITHUB_OUTPUT"
            echo "FORCE=${{ inputs.force }}" >> "$GITHUB_OUTPUT"
            echo "DRY_RUN=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migration
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SLUGS: ${{ steps.cfg.outputs.SLUGS }}
          FIELDS: ${{ steps.cfg.outputs.FIELDS }}
          FORCE: ${{ steps.cfg.outputs.FORCE }}
          DRY_RUN: ${{ steps.cfg.outputs.DRY_RUN }}
        run: npm run sanity:migrate-content

      - name: Upload pre-migration backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-migrate-content-backup-${{ github.run_id }}
          path: scripts/sanity/backups/
          if-no-files-found: ignore
          retention-days: 90
